name: Test Generator
on:
  push:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup UV
        uses: astral-sh/setup-uv@v8.1.0
      - name: Sync UV (no venv)
        run: uv pip install .
      - name: Run tests with pytest
        run: uv run --frozen pytest
